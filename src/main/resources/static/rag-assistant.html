<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Documentation Assistant | SpingResumeParser</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --hc-green: #22c55e;
      --hc-green-dark: #16a34a;
      --hc-green-light: #4ade80;
      --hc-green-bg: #f0fdf4;
      --bg-primary: #f8fafc;
      --bg-card: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 24px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .header-badge {
      display: inline-block;
      background: var(--hc-green);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 968px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Upload Section */
    .upload-section {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border-color);
      height: fit-content;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .upload-zone:hover {
      border-color: var(--hc-green);
      background: var(--hc-green-bg);
    }

    .upload-zone.dragging {
      border-color: var(--hc-green);
      background: var(--hc-green-bg);
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .upload-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    #fileInput {
      display: none;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--hc-green);
      color: white;
    }

    .btn-primary:hover {
      background: var(--hc-green-dark);
    }

    .btn-primary:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: white;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: var(--bg-primary);
    }

    .status-message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status-success {
      background: var(--hc-green-bg);
      color: var(--hc-green-dark);
      border: 1px solid var(--hc-green-light);
    }

    .status-error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-card {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--hc-green);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Chat Section */
    .chat-section {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-avatar {
      background: var(--hc-green-bg);
      color: var(--hc-green-dark);
    }

    .ai-avatar {
      background: #f0f9ff;
      color: #0369a1;
    }

    .message-content {
      flex: 1;
    }

    .message-role {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    .message-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      background: var(--bg-primary);
      padding: 12px 16px;
      border-radius: 8px;
    }

    .user-message .message-text {
      background: var(--hc-green-bg);
      color: var(--text-primary);
    }

    .sources {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 6px;
      border-left: 3px solid var(--hc-green);
    }

    .sources-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .source-item {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      padding: 6px 8px;
      background: white;
      border-radius: 4px;
    }

    .similarity-score {
      display: inline-block;
      background: var(--hc-green-bg);
      color: var(--hc-green-dark);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
    }

    .chat-input-container {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
    }

    .quick-questions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .quick-btn {
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: var(--hc-green-bg);
      border-color: var(--hc-green);
      color: var(--hc-green-dark);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      outline: none;
    }

    .chat-input:focus {
      border-color: var(--hc-green);
    }

    .send-btn {
      padding: 12px 20px;
      background: var(--hc-green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover {
      background: var(--hc-green-dark);
    }

    .send-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--bg-primary);
      border-top-color: var(--hc-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <span class="header-badge">Module 6 - RAG System</span>
    <h1>🤖 AI Documentation Assistant</h1>
    <p>Upload your documentation and ask questions powered by RAG</p>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Upload Section -->
    <div class="upload-section">
      <div class="section-title">
        📄 Upload Documents
      </div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Drop your document here</div>
        <div class="upload-hint">or click to browse</div>
        <div class="upload-hint" style="margin-top: 8px;">Supports: .txt, .md, .pdf</div>
      </div>

      <input type="file" id="fileInput" accept=".txt,.md,.pdf">

      <button class="btn btn-primary" id="uploadBtn" disabled>
        Upload & Index Document
      </button>

      <button class="btn btn-secondary" id="indexDefaultBtn">
        Index Default Documentation
      </button>

      <div class="status-message" id="statusMessage"></div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="chunksCount">0</div>
          <div class="stat-label">Chunks Indexed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="docsCount">0</div>
          <div class="stat-label">Documents</div>
        </div>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
      <div class="chat-header">
        <div class="section-title">💬 Ask Questions</div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <div class="empty-icon">🎯</div>
          <div>Upload documents and start asking questions!</div>
        </div>
      </div>

      <div class="chat-input-container">
        <div class="quick-questions" id="quickQuestions">
          <button class="quick-btn" data-question="How do I track my order?">📦 Track Order</button>
          <button class="quick-btn" data-question="What is your return policy?">↩️ Return Policy</button>
          <button class="quick-btn" data-question="What payment methods do you accept?">💳 Payments</button>
          <button class="quick-btn" data-question="How long does shipping take?">🚚 Shipping</button>
        </div>

        <div class="input-row">
            <textarea
                    id="questionInput"
                    class="chat-input"
                    placeholder="Ask a question about your documents..."
                    rows="1"
            ></textarea>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8081/api/docs';

  let selectedFile = null;
  let totalChunks = 0;
  let totalDocs = 0;

  // FIX: Added counter to ensure unique message IDs
  let messageIdCounter = 0;

  // Upload Zone Elements
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const indexDefaultBtn = document.getElementById('indexDefaultBtn');
  const statusMessage = document.getElementById('statusMessage');
  const chunksCount = document.getElementById('chunksCount');
  const docsCount = document.getElementById('docsCount');

  // Chat Elements
  const chatMessages = document.getElementById('chatMessages');
  const questionInput = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn')
  const quickQuestions = document.getElementById('quickQuestions');

  // Upload Zone Click
  uploadZone.addEventListener('click', () => fileInput.click());

  // Drag and Drop
  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragging');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragging');
  });

  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragging');

    const files = e.dataTransfer.files;
    if (files.length > 0) {
      handleFileSelect(files[0]);
    }
  });

  // File Input Change
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFileSelect(e.target.files[0]);
    }
  });

  function handleFileSelect(file) {
    const validExtensions = ['.txt', '.md', '.pdf'];
    const extension = '.' + file.name.split('.').pop().toLowerCase();

    if (!validExtensions.includes(extension)) {
      showStatus('Only .txt, .md, and .pdf files are supported', 'error');
      return;
    }

    selectedFile = file;
    uploadBtn.disabled = false;
    uploadBtn.textContent = `Upload "${file.name}"`;
    showStatus(`Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`, 'success');
  }

  // Upload Document
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="loading"></span> Uploading...';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const response = await fetch(`${API_BASE}/upload`, {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (data.success) {
        totalChunks += data.chunksCreated;
        totalDocs += 1;
        chunksCount.textContent = totalChunks;
        docsCount.textContent = totalDocs;

        showStatus(`✅ Indexed ${data.chunksCreated} chunks from ${data.filename}`, 'success');

        selectedFile = null;
        fileInput.value = '';
        uploadBtn.textContent = 'Upload & Index Document';
        uploadBtn.disabled = true;
      } else {
        showStatus(`❌ ${data.error}`, 'error');
        uploadBtn.disabled = false;
        uploadBtn.textContent = `Upload "${selectedFile.name}"`;
      }
    } catch (error) {
      showStatus(`❌ Upload failed: ${error.message}`, 'error');
      uploadBtn.disabled = false;
      uploadBtn.textContent = `Upload "${selectedFile.name}"`;
    }
  });

  // Index Default Documentation
  indexDefaultBtn.addEventListener('click', async () => {
    indexDefaultBtn.disabled = true;
    indexDefaultBtn.innerHTML = '<span class="loading"></span> Indexing...';

    try {
      const response = await fetch(`${API_BASE}/index`, {
        method: 'POST'
      });

      const data = await response.json();

      if (data.success) {
        totalChunks += data.chunksCreated;
        totalDocs += 1;
        chunksCount.textContent = totalChunks;
        docsCount.textContent = totalDocs;

        showStatus(`✅ Indexed ${data.chunksCreated} chunks from default documentation`, 'success');
      } else {
        showStatus(`❌ ${data.error}`, 'error');
      }
    } catch (error) {
      showStatus(`❌ Indexing failed: ${error.message}`, 'error');
    } finally {
      indexDefaultBtn.disabled = false;
      indexDefaultBtn.textContent = 'Index Default Documentation';
    }
  });

  function showStatus(message, type) {
    statusMessage.textContent = message;
    statusMessage.className = `status-message status-${type}`;
    statusMessage.style.display = 'block';

    setTimeout(() => {
      statusMessage.style.display = 'none';
    }, 5000);
  }

  // Quick Questions
  quickQuestions.addEventListener('click', (e) => {
    if (e.target.classList.contains('quick-btn')) {
      const question = e.target.dataset.question;
      questionInput.value = question;
      askQuestion(question);
    }
  });

  // Send Question
  sendBtn.addEventListener('click', () => {
    const question = questionInput.value.trim();
    if (question) {
      askQuestion(question);
    }
  });

  questionInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const question = questionInput.value.trim();
      if (question) {
        askQuestion(question);
      }
    }
  });

  async function askQuestion(question) {
    // Clear empty state
    const emptyState = chatMessages.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    // Add user message
    addMessage('user', question);
    questionInput.value = '';
    sendBtn.disabled = true;

    // Add loading message
    const loadingId = addMessage('ai', '<span class="loading"></span> Thinking...', true);

    try {
      const response = await fetch(`${API_BASE}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      const data = await response.json();

      // Remove loading message
      document.getElementById(loadingId).remove();

      if (data.success) {
        addMessage('ai', data.answer, false, data.sources);
      } else {
        addMessage('ai', `Error: ${data.error}`, false);
      }
    } catch (error) {
      document.getElementById(loadingId).remove();
      addMessage('ai', `Failed to get answer: ${error.message}`, false);
    } finally {
      sendBtn.disabled = false;
    }
  }

  // FIX: Added counter to timestamp to ensure unique IDs even when called in same millisecond
  function addMessage(role, text, isLoading = false, sources = null) {
    const messageId = 'msg-' + Date.now() + '-' + (++messageIdCounter);
    const isUser = role === 'user';

    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
    messageDiv.id = messageId;

    messageDiv.innerHTML = `
      <div class="message-avatar ${isUser ? 'user-avatar' : 'ai-avatar'}">
        ${isUser ? 'U' : 'AI'}
      </div>
      <div class="message-content">
        <div class="message-role">${isUser ? 'You' : 'AI Assistant'}</div>
        <div class="message-text">${text}</div>
        ${sources && sources.length > 0 ? `
          <div class="sources">
            <div class="sources-title">📚 Sources:</div>
            ${sources.map((src, i) => `
              <div class="source-item">
                ${i + 1}. ${src.content.substring(0, 100)}...
                <span class="similarity-score">${(src.similarityScore * 100).toFixed(0)}% match</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;

    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return messageId;
  }

  // Auto-resize textarea
  questionInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
