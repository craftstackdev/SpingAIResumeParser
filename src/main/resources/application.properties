# ==============================================================================
# SPRING AI CHATBOT - APPLICATION CONFIGURATION
# ==============================================================================

# Application Settings
spring.application.name=ai-chatbot
server.port=8081

# ==========================================
# PostgreSQL + pgvector Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_ecommerce
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (Production)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ==========================================
# PgVector Configuration (BEST PRACTICES)
# ==========================================

# Initialize schema automatically
# Set to false in production after first run
spring.ai.vectorstore.pgvector.initialize-schema=true

# Index Type: HNSW (Recommended for production)
# Options: HNSW (fast, approximate) or IVFFLAT (slower, configurable)
spring.ai.vectorstore.pgvector.index-type=HNSW

# Distance Type: COSINE_DISTANCE (Best for text embeddings)
# Options: COSINE_DISTANCE, EUCLIDEAN_DISTANCE, NEGATIVE_INNER_PRODUCT
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Dimensions: 1536 for OpenAI text-embedding-3-small
# CRITICAL: Must match your embedding model
spring.ai.vectorstore.pgvector.dimensions=1536

# Table name (default: vector_store)
# spring.ai.vectorstore.pgvector.table-name=vector_store

# Schema name (default: public)
# spring.ai.vectorstore.pgvector.schema-name=public

# OpenAI Configuration (Auto-configured by Spring AI)
spring.ai.openai.api-key=test
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=1
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# Gemini Configuration (Custom properties for OpenAI-compatible API)
gemini.api.key=test
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/openai
gemini.api.completions.path=/chat/completions
gemini.model.name=gemini-2.0-flash

# Embedding Model Configuration (BEST PRACTICE)
# text-embedding-3-small: Fast, cheap, good quality
# text-embedding-3-large: Better quality, more expensive
spring.ai.openai.embedding.model=text-embedding-3-small

# ==========================================
# Logging Configuration (Production)
# ==========================================
logging.level.root=INFO
logging.level.com.SpingResumeParser.ai_chatbot=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.jdbc=WARN

# ==============================================================================
# PROPERTY EXPLANATIONS
# ==============================================================================
#
# GENERAL SETTINGS:
# -----------------
# spring.application.name    : Application identifier used in logs, monitoring,
#                              and service discovery.
#
# server.port                : HTTP port for embedded Tomcat server.
#                              Default is 8080, changed to 8081 to avoid conflicts.
#                              Access the app at: http://localhost:8081
#
#
# OPENAI CONFIGURATION:
# ---------------------
# These are STANDARD Spring AI properties. When Spring Boot detects these
# properties along with spring-ai-openai-starter on classpath, it automatically
# creates OpenAiChatModel bean.
#
# spring.ai.openai.api-key   : Your OpenAI API key from https://platform.openai.com/api-keys
#                              SECURITY: Use environment variable in production!
#                              Example: spring.ai.openai.api-key=${OPENAI_API_KEY}
#
# spring.ai.openai.chat.options.model : Default model for chat completions.
#                              Available: gpt-4o, gpt-4o-mini, gpt-4-turbo, gpt-3.5-turbo
#
# spring.ai.openai.chat.options.temperature : Controls randomness/creativity (0.0 to 2.0)
#                              0.0 = Deterministic (same output every time)
#                              0.7 = Balanced (good default)
#                              1.0 = Creative, varied responses
#                              2.0 = Maximum randomness
#
#
# GEMINI CONFIGURATION:
# ---------------------
# These are CUSTOM properties (not Spring Boot standard). They are injected
# into MultiModelConfig.java using @Value annotations.
#
# Spring AI doesn't have built-in Gemini auto-configuration yet, so we manually
# configure it using OpenAI-compatible API settings. Google provides an endpoint
# that mimics OpenAI's API structure.
#
# gemini.api.key             : Your Gemini API key from https://aistudio.google.com/apikey
#                              SECURITY: Use environment variable in production!
#                              Example: gemini.api.key=${GEMINI_API_KEY}
#
# gemini.api.url             : Base URL for Gemini's OpenAI-compatible API endpoint.
#
# gemini.api.completions.path: Path for chat completions (appended to base URL).
#                              Full URL: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
#
# gemini.model.name          : Gemini model to use.
#                              Available: gemini-2.0-flash, gemini-1.5-flash, gemini-1.5-pro
#
#
# TEMPERATURE GUIDE:
# ------------------
# 0.0 - 0.3  : Code generation, factual answers, math
# 0.5 - 0.7  : General conversations, Q&A
# 0.8 - 1.2  : Creative writing, storytelling
# 1.5 - 2.0  : Brainstorming, wild ideas
#
#
# SECURITY BEST PRACTICE:
# -----------------------
# Never commit real API keys to version control!
#
# Option 1 - Environment variable in properties:
#   spring.ai.openai.api-key=${OPENAI_API_KEY}
#
# Option 2 - Command line argument:
#   java -jar app.jar --spring.ai.openai.api-key=sk-xxx
#
# Option 3 - System environment variable:
#   export SPRING_AI_OPENAI_API_KEY=sk-xxx


