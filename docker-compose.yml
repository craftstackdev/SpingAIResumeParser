version: '3.8'

services:
  # PostgreSQL with pgvector extension for vector embeddings
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: ai-ecommerce-pgvector
    environment:
      POSTGRES_DB: ai_ecommerce
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
    driver: local

networks:
  ai-network:
    driver: bridge
